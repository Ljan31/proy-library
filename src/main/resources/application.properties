spring.application.name=springboot-library
server.port=8098
spring.profiles.active=dev

spring.datasource.url=jdbc:postgresql://localhost:5432/db_proy_library
spring.datasource.username=postgres
spring.datasource.password=123456

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

app.jwt.secret=ESTA_CLAVE_DEBE_TENER_MINIMO_32_CARACTERES
app.jwt.expiration=86400000


# # Configuración de prestamos
# prestamo.dias-maximos=3
# prestamo.renovaciones-maximas=2
# prestamo.ejemplares-simultaneos-maximos=3

app.certificados.ruta-base=./certificados

app.storage.tipos.portadas.ruta-base=./portadas
app.storage.tipos.portadas.url-base=/portadas

app.storage.tipos.logos.ruta-base=./logos
app.storage.tipos.logos.url-base=/logos

app.storage.tipos.pdfs.ruta-base=./pdfs
app.storage.tipos.pdfs.url-base=/pdfs

app.storage.tipos.respaldos_encargados.ruta-base=./respaldos_encargados
app.storage.tipos.respaldos_encargados.url-base=/respaldos_encargados

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

spring.task.scheduling.pool.size=3
spring.jackson.time-zone=America/La_Paz